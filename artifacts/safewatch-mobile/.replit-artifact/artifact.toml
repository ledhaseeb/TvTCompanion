kind = "mobile"
previewPath = "/"
title = "SafeWatch"
version = "1.0.0"
id = "artifacts/safewatch-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 22794
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/safewatch-mobile run dev"

[services.env]
PORT = "22794"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/safewatch-mobile", "run", "build"]
run = ["pnpm", "--filter", "@workspace/safewatch-mobile", "run", "serve"]
